<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=./privacy-policy/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CalFin Privacy Policy</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #eef5fb 0%, #f8fbfe 48%, #fff5eb 100%);
        color: #16324a;
        font-family: "Gill Sans", "Trebuchet MS", sans-serif;
      }

      .card {
        width: min(560px, calc(100% - 32px));
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(22, 50, 74, 0.12);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 18px 40px rgba(18, 43, 67, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }

      p {
        margin: 0 0 14px;
        color: #4a6175;
        line-height: 1.6;
      }

      a {
        color: #1d6fa3;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>CalFin Privacy Policy</h1>
      <p>Anda akan diarahkan otomatis ke halaman kebijakan privasi CalFin.</p>
      <p>Jika tidak berpindah, buka <a href="./privacy-policy/">halaman ini</a>.</p>
    </main>
  </body>
</html>
